# Archypix development federation stack — 3 backends
#
# Topology:
#   resolver:  manages archypix.local          → port 8080
#   backend1:  uses resolver, archypix.local   → port 8001
#   backend2:  uses resolver, archypix.local   → port 8002
#   backend3:  standalone (own resolver)       → port 8003
#
# All inter-service traffic uses HTTP (BACK_USE_HTTPS=false, FEDERATION_USE_HTTPS=false).
#
# Source code is mounted directly — restart a container to recompile:
#   docker compose -f docker-compose.dev.yml restart backend1
#
# If you change Cargo.toml/Cargo.lock, rebuild the image:
#   docker compose -f docker-compose.dev.yml build backend1
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#   Frontend: open front-test/index.html — set backend to http://localhost:8001, :8002, or :8003

services:
  resolver:
    build:
      context: ./resolver
      target: dev
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USER: archypix
      DB_PASSWORD: archypix
      DB_NAME: archypix_resolver
      GLOBAL_DOMAIN: localhost:8080
      RESOLVER_JWT_SECRET: devsecret
      CORS_ORIGINS: "*"
      RUST_LOG: info,archypix_resolver=trace
    volumes:
      - ./resolver/Cargo.toml:/app/Cargo.toml
      - ./resolver/Cargo.lock:/app/Cargo.lock
      - ./resolver/src:/app/src
      - resolver_target:/app/target
    depends_on:
      - postgres

  backend1:
    build:
      context: ./back
      target: dev
    ports:
      - "8001:8000"
    env_file:
      - .env.back.common
    environment:
      BACK_DOMAIN: localhost:8001
      BACK_INTERNAL_URL: http://backend1:8000
      GLOBAL_DOMAIN: localhost:8080
      USE_RESOLVER: "true"
      RESOLVER_INTERNAL_URL: http://resolver:8080
      RESOLVER_JWT_SECRET: devsecret
      JWT_SECRET: devjwtsecret1
      DB_HOST: postgres
      DB_USER: archypix
      DB_PASSWORD: archypix
      DB_NAME: archypix_back1
      REDIS_HOST: redis
      REDIS_PASSWORD: archypix
      REDIS_DB: "0"
      S3_BUCKET_STAGING: b1-archypix-staging
      S3_BUCKET_PICTURES: b1-archypix-pictures
      S3_BUCKET_VERSIONS: b1-archypix-versions
      S3_BUCKET_SMALL: b1-archypix-small
      S3_BUCKET_MEDIUM: b1-archypix-medium
      S3_BUCKET_LARGE: b1-archypix-large
    volumes:
      - ./back/.sqlx:/app/.sqlx
      - ./back/migrations:/app/migrations
      - ./back/src:/app/src
      - ./back/Cargo.toml:/app/Cargo.toml
      - ./back/Cargo.lock:/app/Cargo.lock
      - back_target:/app/target
    depends_on:
      - postgres
      - redis
      - minio
      - resolver

  backend2:
    build:
      context: ./back
      target: dev
    ports:
      - "8002:8000"
    env_file:
      - .env.back.common
    environment:
      BACK_DOMAIN: localhost:8002
      BACK_INTERNAL_URL: http://backend2:8000
      GLOBAL_DOMAIN: localhost:8080
      USE_RESOLVER: "true"
      RESOLVER_INTERNAL_URL: http://resolver:8080
      RESOLVER_JWT_SECRET: devsecret
      JWT_SECRET: devjwtsecret2
      DB_HOST: postgres
      DB_USER: archypix
      DB_PASSWORD: archypix
      DB_NAME: archypix_back2
      REDIS_HOST: redis
      REDIS_PASSWORD: archypix
      REDIS_DB: "1"
      S3_BUCKET_STAGING: b2-archypix-staging
      S3_BUCKET_PICTURES: b2-archypix-pictures
      S3_BUCKET_VERSIONS: b2-archypix-versions
      S3_BUCKET_SMALL: b2-archypix-small
      S3_BUCKET_MEDIUM: b2-archypix-medium
      S3_BUCKET_LARGE: b2-archypix-large
    volumes:
      - ./back/.sqlx:/app/.sqlx
      - ./back/migrations:/app/migrations
      - ./back/src:/app/src
      - ./back/Cargo.toml:/app/Cargo.toml
      - ./back/Cargo.lock:/app/Cargo.lock
      - back_target:/app/target
    depends_on:
      - postgres
      - redis
      - minio
      - resolver

  backend3:
    build:
      context: ./back
      target: dev
    ports:
      - "8003:8000"
    env_file:
      - .env.back.common
    environment:
      BACK_DOMAIN: localhost:8003
      GLOBAL_DOMAIN: localhost:8003
      USE_RESOLVER: "false"
      JWT_SECRET: devjwtsecret3
      DB_HOST: postgres
      DB_USER: archypix
      DB_PASSWORD: archypix
      DB_NAME: archypix_back3
      REDIS_HOST: redis
      REDIS_PASSWORD: archypix
      REDIS_DB: "2"
      S3_BUCKET_STAGING: b3-archypix-staging
      S3_BUCKET_PICTURES: b3-archypix-pictures
      S3_BUCKET_VERSIONS: b3-archypix-versions
      S3_BUCKET_SMALL: b3-archypix-small
      S3_BUCKET_MEDIUM: b3-archypix-medium
      S3_BUCKET_LARGE: b3-archypix-large
    volumes:
      - ./back/.sqlx:/app/.sqlx
      - ./back/migrations:/app/migrations
      - ./back/src:/app/src
      - ./back/Cargo.toml:/app/Cargo.toml
      - ./back/Cargo.lock:/app/Cargo.lock
      - back_target:/app/target
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: archypix_resolver
      POSTGRES_USER: archypix
      POSTGRES_PASSWORD: archypix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:latest
    command: redis-server --requirepass archypix --appendonly yes
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: archypix
      MINIO_ROOT_PASSWORD: archypix
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --address :9000 --console-address :9001
    volumes:
      - minio_data:/data

volumes:
  # Cargo build caches — pre-seeded from image on first start, persist across restarts.
  resolver_target:
  back_target:
  # Infrastructure data
  postgres_data:
  redis_data:
  minio_data:
