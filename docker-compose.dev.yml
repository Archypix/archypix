# Archypix development federation stack
#
# Source code is mounted directly — restart a container to recompile:
#   docker compose -f docker-compose.dev.yml restart backend1
#   docker compose -f docker-compose.dev.yml restart resolver
#
# First start builds the images and pre-caches dependencies (~2-3 min).
# Subsequent restarts only recompile changed files (~10-30s).
#
# Named target/ volumes persist compiled artifacts across restarts.
# If you change Cargo.toml/Cargo.lock, rebuild the image:
#   docker compose -f docker-compose.dev.yml build backend1
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#   Frontend: open front-test/index.html — set backend to http://localhost:8001 or :8002

services:
  resolver:
    build:
      context: ./resolver
      target: dev
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://archypix:archypix@postgres/archypix_resolver
      MANAGED_DOMAIN: archypix.local
      RESOLVER_ADMIN_SECRET: devsecret
      LISTEN_ADDR: 0.0.0.0:8080
      RUST_LOG: debug,archypix_resolver=trace
      FRONT_URL: "*"
    volumes:
      - ./resolver/Cargo.toml:/app/Cargo.toml
      - ./resolver/Cargo.lock:/app/Cargo.lock
      - ./resolver/src:/app/src
      - ./resolver/target:/app/target
    depends_on:
      - postgres

  backend1:
    build:
      context: ./back
      target: dev
    ports:
      - "8001:8000"
    environment:
      LISTEN_ADDR: 0.0.0.0:8000
      USE_RESOLVER: "true"
      HOST: localhost:8001
      PUBLIC_BASE_URL: http://localhost:8001
      WEBFINGER_HOST: archypix.local
      RESOLVER_URL: http://resolver:8080
      RESOLVER_ADMIN_SECRET: devsecret
      JWT_SECRET: devjwtsecret1
      DATABASE_URL: postgres://archypix:archypix@postgres/archypix_back1
      REDIS_URL: redis://default:archypix@redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: archypix
      S3_SECRET_KEY: archypix
      S3_REGION: us-east-1
      S3_BUCKET_STAGING: b1-archypix-staging
      S3_BUCKET_PICTURES: b1-archypix-pictures
      S3_BUCKET_VERSIONS: b1-archypix-versions
      S3_BUCKET_SMALL: b1-archypix-small
      S3_BUCKET_MEDIUM: b1-archypix-medium
      S3_BUCKET_LARGE: b1-archypix-large
      S3_PRESIGN_TTL_SECS: "3600"
      S3_PRESIGN_CACHE_MARGIN_SECS: "600"
      FRONT_URL: "*"
      FEDERATION_SCHEME: http
      ACCESS_TOKEN_TTL_SECS: "900"
      REFRESH_TOKEN_TTL_SECS: "2592000"
      FEDERATION_JWT_TTL_SECS: "900"
      FEDERATION_BACKEND_CACHE_TTL_SECS: "3600"
      FEDERATION_REQUEST_TIMEOUT_MS: "5000"
      SQLX_OFFLINE: "true"
      RUST_LOG: debug,archypix_back=trace
    volumes:
      - ./back/.sqlx:/app/.sqlx
      - ./back/migrations:/app/migrations
      - ./back/src:/app/src
      - ./back/Cargo.toml:/app/Cargo.toml
      - ./back/Cargo.lock:/app/Cargo.lock
      - ./back/target:/app/target
    depends_on:
      - postgres
      - redis
      - minio
      - resolver

  backend2:
    build:
      context: ./back
      target: dev
    ports:
      - "8002:8000"
    environment:
      LISTEN_ADDR: 0.0.0.0:8000
      USE_RESOLVER: "false"
      HOST: localhost:8002
      PUBLIC_BASE_URL: http://localhost:8002
      WEBFINGER_HOST: localhost:8002
      JWT_SECRET: devjwtsecret2
      DATABASE_URL: postgres://archypix:archypix@postgres/archypix_back2
      REDIS_URL: redis://default:archypix@redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: archypix
      S3_SECRET_KEY: archypix
      S3_REGION: us-east-1
      S3_BUCKET_STAGING: b2-archypix-staging
      S3_BUCKET_PICTURES: b2-archypix-pictures
      S3_BUCKET_VERSIONS: b2-archypix-versions
      S3_BUCKET_SMALL: b2-archypix-small
      S3_BUCKET_MEDIUM: b2-archypix-medium
      S3_BUCKET_LARGE: b2-archypix-large
      S3_PRESIGN_TTL_SECS: "3600"
      S3_PRESIGN_CACHE_MARGIN_SECS: "600"
      FRONT_URL: "*"
      FEDERATION_SCHEME: http
      ACCESS_TOKEN_TTL_SECS: "900"
      REFRESH_TOKEN_TTL_SECS: "2592000"
      FEDERATION_JWT_TTL_SECS: "900"
      FEDERATION_BACKEND_CACHE_TTL_SECS: "3600"
      FEDERATION_REQUEST_TIMEOUT_MS: "5000"
      SQLX_OFFLINE: "true"
      RUST_LOG: debug,archypix_back=trace
    volumes:
      - ./back/.sqlx:/app/.sqlx
      - ./back/migrations:/app/migrations
      - ./back/src:/app/src
      - ./back/Cargo.toml:/app/Cargo.toml
      - ./back/Cargo.lock:/app/Cargo.lock
      - ./back/target:/app/target
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: archypix_resolver
      POSTGRES_USER: archypix
      POSTGRES_PASSWORD: archypix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:latest
    command: redis-server --requirepass archypix --appendonly yes
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: archypix
      MINIO_ROOT_PASSWORD: archypix
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --address :9000 --console-address :9001
    volumes:
      - minio_data:/data

volumes:
  # Cargo build caches — pre-seeded from image on first start, persist across restarts.
  resolver_target:
  back_target:
  # Infrastructure data
  postgres_data:
  redis_data:
  minio_data:
