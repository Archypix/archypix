services:
  postgres:
    image: postgres:18-alpine
    container_name: archypix-back-db
    environment:
      POSTGRES_DB: archypix_back
      POSTGRES_USER: archypix
      POSTGRES_PASSWORD: archypix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U archypix" ]
      interval: 10s
      timeout: 5s
      retries: 5

  archypix-minio:
    image: minio/minio:latest
    container_name: archypix-back-minio
    environment:
      MINIO_ROOT_USER: archypix
      MINIO_ROOT_PASSWORD: archypix
    ports:
      - "9002:9000" # MinIO API
      - "9001:9001" # MinIO console
    volumes:
      - minio_data:/data
    command: [ "server", "/data", "--address", ":9000", "--console-address", ":9001" ]


  redis:
    image: redis:latest
    container_name: archypix-back-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--requirepass archypix --appendonly yes

volumes:
  postgres_data:
  minio_data:
  redis_data:
