# Archypix production stack
#
# Resolver:  archypix.com          → port 8080
# Backend 1: backend1.archypix.com → port 8001
# Backend 2: backend2.archypix.com → port 8002
#
# Both backends share the same resolver (archypix.com).
# For TLS, put nginx or Caddy in front and proxy each domain to its port.
#
# Secrets: set JWT_SECRET_*, RESOLVER_JWT_SECRET, MINIO_ROOT_PASSWORD via a .env file.
# Do NOT use the placeholder values below in production.
#
# Usage:
#   docker compose up --build

services:
  resolver:
    build: ./resolver
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USER: archypix
      DB_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      DB_NAME: archypix_resolver
      GLOBAL_DOMAIN: archypix.com
      RESOLVER_JWT_SECRET: ${RESOLVER_JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: https://archypix.com
      RUST_LOG: info
    depends_on:
      - postgres

  backend1:
    build: ./back
    ports:
      - "8001:8000"
    environment:
      BACK_DOMAIN: backend1.archypix.com
      BACK_USE_HTTPS: "true"
      BACK_INTERNAL_URL: http://backend1:8000
      GLOBAL_DOMAIN: archypix.com
      USE_RESOLVER: "true"
      RESOLVER_INTERNAL_URL: http://resolver:8080
      RESOLVER_JWT_SECRET: ${RESOLVER_JWT_SECRET:-change-me-in-production}
      JWT_SECRET: ${JWT_SECRET_BACKEND1:-change-me-in-production}
      CORS_ORIGINS: https://archypix.com
      DB_HOST: postgres
      DB_USER: archypix
      DB_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      DB_NAME: archypix_back1
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-in-production}
      REDIS_DB: "0"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-archypix}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change-me-in-production}
      S3_BUCKET_STAGING: b1-archypix-staging
      S3_BUCKET_PICTURES: b1-archypix-pictures
      S3_BUCKET_VERSIONS: b1-archypix-versions
      S3_BUCKET_SMALL: b1-archypix-small
      S3_BUCKET_MEDIUM: b1-archypix-medium
      S3_BUCKET_LARGE: b1-archypix-large
      FEDERATION_USE_HTTPS: "true"
      RUST_LOG: info
    depends_on:
      - postgres
      - redis
      - minio
      - resolver

  backend2:
    build: ./back
    ports:
      - "8002:8000"
    environment:
      BACK_DOMAIN: backend2.archypix.com
      BACK_USE_HTTPS: "true"
      BACK_INTERNAL_URL: http://backend2:8000
      GLOBAL_DOMAIN: archypix.com
      USE_RESOLVER: "true"
      RESOLVER_INTERNAL_URL: http://resolver:8080
      RESOLVER_JWT_SECRET: ${RESOLVER_JWT_SECRET:-change-me-in-production}
      JWT_SECRET: ${JWT_SECRET_BACKEND2:-change-me-in-production}
      CORS_ORIGINS: https://archypix.com
      DB_HOST: postgres
      DB_USER: archypix
      DB_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      DB_NAME: archypix_back2
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-in-production}
      REDIS_DB: "1"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-archypix}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-change-me-in-production}
      S3_BUCKET_STAGING: b2-archypix-staging
      S3_BUCKET_PICTURES: b2-archypix-pictures
      S3_BUCKET_VERSIONS: b2-archypix-versions
      S3_BUCKET_SMALL: b2-archypix-small
      S3_BUCKET_MEDIUM: b2-archypix-medium
      S3_BUCKET_LARGE: b2-archypix-large
      FEDERATION_USE_HTTPS: "true"
      RUST_LOG: info
    depends_on:
      - postgres
      - redis
      - minio
      - resolver

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: archypix_resolver
      POSTGRES_USER: archypix
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:latest
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me-in-production} --appendonly yes
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-archypix}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-in-production}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --address :9000 --console-address :9001
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
