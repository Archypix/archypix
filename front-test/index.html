<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Archypix Dev Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        pre {
            white-space: pre-wrap;
            word-break: break-all;
        }
        .input {
            @apply border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400;
        }
        .btn {
            @apply px-3 py-1 rounded text-sm font-medium cursor-pointer;
        }
        .out {
            @apply bg-gray-50 border border-gray-200 rounded p-2 text-xs max-h-64 overflow-auto min-h-8 font-mono;
        }
        .card {
            @apply bg-white rounded shadow p-4;
        }
        .tab-btn {
            @apply px-4 py-2 text-sm font-medium rounded-t-lg transition-colors;
        }
        .tab-active {
            @apply bg-white text-blue-700 border-b-2 border-blue-600;
        }
        .tab-inactive {
            @apply text-gray-500 hover:text-gray-700 hover:bg-gray-100;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 text-sm" id="app">

<!-- CONFIG BAR -->
<div class="sticky top-0 z-50 bg-gray-900 text-white p-3 flex flex-wrap gap-3 items-center shadow-lg text-xs">
    <span class="font-bold text-yellow-400 mr-2">Archypix Dev Tool</span>
    <label class="flex flex-col">
        <span class="text-gray-400">Backend</span>
        <input class="bg-gray-700 px-2 py-1 rounded w-56" placeholder="http://localhost:8000" v-model="backend"/>
    </label>
    <label class="flex flex-col">
        <span class="text-gray-400">Resolver</span>
        <input class="bg-gray-700 px-2 py-1 rounded w-56" placeholder="http://localhost:8080" v-model="resolver"/>
    </label>
    <span class="text-green-400" v-if="username">Logged in as <b>{{ username }}</b></span>
    <span class="text-gray-400 text-xs" v-if="!username">Not logged in</span>
    <button @click="logout" class="ml-auto bg-red-600 hover:bg-red-700 px-3 py-1 rounded">Logout</button>
</div>

<!-- TABS -->
<div class="max-w-5xl mx-auto pt-4 px-4">
    <div class="flex gap-1 border-b border-gray-200">
        <button :class="activeTab === tab.id ? 'tab-btn tab-active' : 'tab-btn tab-inactive'" :key="tab.id"
                @click="activeTab = tab.id"
                v-for="tab in tabs">
            {{ tab.label }}
        </button>
    </div>
</div>

<div class="max-w-5xl mx-auto p-4 space-y-5">
    <auth-tab :state="sharedState" @update="onStateUpdate" v-if="activeTab === 'auth'"></auth-tab>
    <pictures-tab :state="sharedState" @update="onStateUpdate" v-if="activeTab === 'pictures'"></pictures-tab>
    <tags-tab :state="sharedState" @update="onStateUpdate" v-if="activeTab === 'tags'"></tags-tab>
    <sharing-tab :state="sharedState" @update="onStateUpdate" v-if="activeTab === 'sharing'"></sharing-tab>
    <settings-tab :state="sharedState" @update="onStateUpdate" v-if="activeTab === 'settings'"></settings-tab>
    <federation-tab :state="sharedState" @update="onStateUpdate" v-if="activeTab === 'federation'"></federation-tab>
    <admin-tab :state="sharedState" @update="onStateUpdate" v-if="activeTab === 'admin'"></admin-tab>
</div>

<script src="tab-auth.js"></script>
<script src="tab-pictures.js"></script>
<script src="tab-tags.js"></script>
<script src="tab-sharing.js"></script>
<script src="tab-settings.js"></script>
<script src="tab-federation.js"></script>
<script src="tab-admin.js"></script>

<script>
    const {createApp} = Vue;

    createApp({
        components: {
            'auth-tab': AuthTab,
            'pictures-tab': PicturesTab,
            'tags-tab': TagsTab,
            'sharing-tab': SharingTab,
            'settings-tab': SettingsTab,
            'federation-tab': FederationTab,
            'admin-tab': AdminTab,
        },

        data(){
            const ls = k => localStorage.getItem(k) || '';
            return {
                backend: ls('archypix_backend') || 'http://localhost:8000',
                resolver: ls('archypix_resolver') || 'http://localhost:8080',
                accessToken: ls('archypix_access'),
                refreshToken: ls('archypix_refresh'),
                username: ls('archypix_username'),
                activeTab: 'auth',
                tabs: [
                    {id: 'auth', label: '🔐 Auth'},
                    {id: 'pictures', label: '🖼 Pictures'},
                    {id: 'tags', label: '🏷 Tags'},
                    {id: 'sharing', label: '📤 Sharing'},
                    {id: 'settings', label: '⚙️ Settings'},
                    {id: 'federation', label: '🌐 Federation'},
                    {id: 'admin', label: '🛠 Admin'},
                ],
            };
        },

        computed: {
            origin(){
                return window.location.origin;
            },
            sharedState(){
                return {
                    backend: this.backend,
                    resolver: this.resolver,
                    accessToken: this.accessToken,
                    refreshToken: this.refreshToken,
                    username: this.username,
                };
            },
        },

        watch: {
            backend(v){
                localStorage.setItem('archypix_backend', v);
            },
            resolver(v){
                localStorage.setItem('archypix_resolver', v);
            },
            accessToken(v){
                localStorage.setItem('archypix_access', v);
            },
            refreshToken(v){
                localStorage.setItem('archypix_refresh', v);
            },
            username(v){
                localStorage.setItem('archypix_username', v);
            },
        },

        methods: {
            onStateUpdate(patch){
                Object.assign(this, patch);
            },

            async logout(){
                if(this.refreshToken){
                    await this._api('/api/auth/logout', {
                        method: 'POST',
                        body: JSON.stringify({refresh_token: this.refreshToken}),
                    }).catch(() => {
                    });
                }
                this.accessToken = this.refreshToken = this.username = '';
            },

            // Global api helper — also exposed on sharedState for tabs
            async _api(path, opts = {}, auth = true, base = null){
                const doFetch = () => {
                    const h = {'Content-Type': 'application/json', ...(opts.headers || {})};
                    if(auth && this.accessToken) h['Authorization'] = `Bearer ${this.accessToken}`;
                    return fetch((base || this.backend) + path, {...opts, headers: h});
                };
                let res = await doFetch();
                if(res.status === 401 && auth){
                    const ok = await this._tryRefresh();
                    if(ok) res = await doFetch();
                    else this.accessToken = this.refreshToken = this.username = '';
                }
                const ct = res.headers.get('content-type') || '';
                const data = ct.includes('json') ? await res.json() : await res.text();
                return {ok: res.ok, status: res.status, data};
            },

            async _tryRefresh(){
                if(!this.refreshToken) return false;
                const res = await fetch(`${this.backend}/api/auth/refresh`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({refresh_token: this.refreshToken}),
                });
                if(!res.ok) return false;
                const d = await res.json();
                this.accessToken = d.access_token;
                this.refreshToken = d.refresh_token;
                return true;
            },
        },
    }).mount('#app');
</script>
</body>
</html>
