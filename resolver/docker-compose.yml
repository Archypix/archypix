services:
  postgres:
    image: postgres:18-alpine
    container_name: archypix-resolver-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: archypix_resolver
      POSTGRES_USER: archypix
      POSTGRES_PASSWORD: archypix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archypix"]
      interval: 10s
      timeout: 5s
      retries: 5

  resolver:
    build: .
    container_name: archypix-resolver
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://archypix:archypix@postgres/archypix_resolver
      MANAGED_DOMAINS: ${MANAGED_DOMAINS:-archypix.com}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me-in-production}
      LISTEN_ADDR: 0.0.0.0:8080
      CACHE_TTL_SECS: ${CACHE_TTL_SECS:-3600}
      CACHE_MAX_CAPACITY: ${CACHE_MAX_CAPACITY:-100000}
      RUST_LOG: ${RUST_LOG:-info,archypix_resolver=debug}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 1s
      retries: 2
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
